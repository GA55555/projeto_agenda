# =============================================================================
# postgresql.conf — afinado para hardware restrito (§1.2 do arquitetura.md)
# AMD A6 (2 nucleos) / 7.2 GB RAM total / orcamento do Postgres: 1.5 GB (§1.1).
# Referenciado pelo docker-compose via: postgres -c config_file=<este ficheiro>.
# Parametros nao listados usam os defaults compilados do PostgreSQL.
# =============================================================================

# ---- Conexoes ----
listen_addresses = '*'          # apenas rede Docker interna (porta nao publicada)
max_connections = 50            # clinica com <=5 psicologas; pool FastAPI + admin (§1.2)

# ---- Memoria (§1.1 / §1.2) ----
shared_buffers = 512MB          # NAO os 25-40% habituais; delega o resto ao page cache do SSD
work_mem = 8MB                  # por operacao de sort/hash, por consulta — valor alto multiplica RAM
maintenance_work_mem = 128MB    # VACUUM / reconstrucao de indices; elevavel via SET LOCAL pontual
effective_cache_size = 2GB      # dica ao planner: quanto de page cache do SO ha disponivel

# ---- Planner (SSD) ----
random_page_cost = 1.1          # SSD: acesso aleatorio barato

# ---- WAL / escrita ----
wal_compression = on
# Arquivamento de WAL para backups no HDD 500 GB e configurado na Fase 8 (§4.2).

# ---- Locale / timezone ----
timezone = 'America/Sao_Paulo'
log_timezone = 'America/Sao_Paulo'

# ---- Logging ----
# ATENCAO: NAO habilitar log de statements. O texto de uma query pode conter PII
# de menores (§0.3 menor exposicao / §2.3). Logamos apenas eventos, nunca conteudo.
log_min_duration_statement = -1        # desliga log de queries (evita PII em log)
log_line_prefix = '%m [%p] %q%u@%d '
log_checkpoints = on
log_connections = on
log_disconnections = on
