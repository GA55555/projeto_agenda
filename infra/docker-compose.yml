# =============================================================================
# docker-compose.yml — Fase 0 (postgres + backend).
# REGRA DE OURO §1.1: nenhum contentor sobe sem `mem_limit` explicito.
# Executar a partir de infra/:  docker compose up --build
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL + pgvector — orcamento 1.5 GB (§1.1), afinado por postgresql.conf
  # --------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16      # PostgreSQL 16 com pgvector ja incluido
    container_name: agenda_postgres
    restart: unless-stopped
    mem_limit: 1500m                   # §1.1
    shm_size: 256m
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-America/Sao_Paulo}
      # Consumidos pelo init 02-roles.sh para criar o role de app (§2.1.1).
      APP_DB_USER: ${APP_DB_USER:-agenda_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [internal]
    # SEM `ports:` — a BD nao e exposta ao host (§4.1).
    # Admin: docker compose exec postgres psql -U $POSTGRES_USER -d $POSTGRES_DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Backend FastAPI — orcamento 1.0 GB (§1.1), 2 workers + uvloop (§1.3)
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: agenda_backend
    restart: unless-stopped
    mem_limit: 1000m                   # §1.1
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Porta do HOST configuravel (evita conflitos com outros servicos, ex. Portainer:8000).
      # Publicada apenas no localhost do servidor (§4.1). Porta interna continua 8000.
      - "127.0.0.1:${BACKEND_HOST_PORT:-8000}:8000"
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------------------------
  # frontend (SPA React + Nginx) — Fase 7. Orcamento 100 MB (§1.1).
  # Nginx serve os estaticos E faz reverse-proxy de /api -> backend:8000
  # (mesma origem: zero CORS; o backend continua nao-exposto, §2.1.1/§4.1).
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: agenda_frontend
    restart: unless-stopped
    mem_limit: 100m                  # §1.1
    depends_on: [backend]
    ports:
      # Ponto de entrada do browser (so no localhost do servidor, §4.1).
      - "127.0.0.1:${FRONTEND_HOST_PORT:-8080}:80"
    networks: [internal]
    healthcheck:
      # Forma portavel do BusyBox wget (a combinada `-qO-` nao parseia no BusyBox).
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
