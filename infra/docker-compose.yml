# =============================================================================
# docker-compose.yml — Fase 0 (postgres + backend).
# REGRA DE OURO §1.1: nenhum contentor sobe sem `mem_limit` explicito.
# Executar a partir de infra/:  docker compose up --build
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL + pgvector — orcamento 1.5 GB (§1.1), afinado por postgresql.conf
  # --------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16      # PostgreSQL 16 com pgvector ja incluido
    container_name: agenda_postgres
    restart: unless-stopped
    mem_limit: 1500m                   # §1.1
    shm_size: 256m
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-America/Sao_Paulo}
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [internal]
    # SEM `ports:` — a BD nao e exposta ao host (§4.1).
    # Admin: docker compose exec postgres psql -U $POSTGRES_USER -d $POSTGRES_DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Backend FastAPI — orcamento 1.0 GB (§1.1), 2 workers + uvloop (§1.3)
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: agenda_backend
    restart: unless-stopped
    mem_limit: 1000m                   # §1.1
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"          # exposto so ao localhost do servidor
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------------------------
  # frontend (SPA + Nginx) — TODO Fase 7. Orcamento 100 MB (§1.1).
  # Framework (React/Vue) ainda nao decidido; servico entra quando houver build.
  # --------------------------------------------------------------------------
  # frontend:
  #   build:
  #     context: ../frontend
  #     dockerfile: Dockerfile
  #   container_name: agenda_frontend
  #   restart: unless-stopped
  #   mem_limit: 100m                  # §1.1
  #   depends_on: [backend]
  #   ports: ["127.0.0.1:8080:80"]
  #   networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
