# Configuracao do Alembic. A URL de ligacao NAO fica aqui (seria segredo em
# codigo, §4.1): e definida em runtime por migrations/env.py a partir das
# settings (role admin/migracao — §2.1.1).
[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
timezone = America/Sao_Paulo

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
