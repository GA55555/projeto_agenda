# =============================================================================
# Nginx da SPA (Fase 7). Serve os estaticos e faz reverse-proxy de /api ->
# backend:8000 (mesma origem => zero CORS; backend nao exposto, §2.1.1/§4.1).
# =============================================================================
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Sem cache de PII em disco/proxy (§0.3): respostas de API nao sao cacheadas.
    # Cabecalhos de seguranca minimos; CSP restritiva (SPA sem terceiros).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;

    # API -> backend (mesma rede docker). Mantem cookies/credenciais.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;    # geracao LLM pode demorar (Fase 6)
    }

    # SPA: qualquer rota desconhecida cai no index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
